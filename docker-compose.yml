services:
  db:
    image: mysql:8.0
    container_name: agro_scale_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agro_scale_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: 
      context: ./backend
    container_name: agro_scale_backend
    restart: always
    ports:
      - "3002:3002"
    environment:
      - DB_TYPE=mysql
      - DB_URL=mysql://root:root@db:3306/agro_scale_db
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=root
      - DB_NAME=agro_scale_db
      - PORT=3002
      - NODE_ENV=development
    depends_on:
      - db

  frontend:
    build: 
      context: ./frontend_v3
    container_name: agro_scale_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://backend:3002
    depends_on:
      - backend

volumes:
  mysql_data:
